# Gyomu Navi — Nginx reverse proxy for EC2 deployment.
#
# Topology:
#   Internet ──HTTPS──▶ Nginx :443 ─┬─▶ Next.js (SPA build, static)     :3000
#                                   └─▶ NestJS                          :3001
#
# - TLS terminated here via certbot-managed cert files.
# - /api/  -> NestJS
# - everything else -> Next.js (SPA fallback to /index.html)
#
# If you instead front this with an ALB, drop the `listen 443 ssl;` block
# and the `ssl_*` lines, and trust X-Forwarded-Proto from the ALB.

# Upstream definitions — keep names stable; PM2 ecosystem assigns ports.
upstream gyomu_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream gyomu_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Redirect plain HTTP to HTTPS (acme-challenge stays on 80).
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com api.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main SPA + API host.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Sensible defaults — adjust to your security policy.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # NestJS issues HttpOnly+Secure cookies; HSTS lets browsers enforce it.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Allow image uploads up to 10MB (matches NestJS DTO cap).
    client_max_body_size 12m;

    # NestJS — everything under /api/*.
    location /api/ {
        proxy_pass         http://gyomu_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Next.js — everything else. The Next server handles its own static assets
    # under /_next/static; we don't need a separate static-files block.
    location / {
        proxy_pass         http://gyomu_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
