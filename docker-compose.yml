services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gyomu
      POSTGRES_PASSWORD: gyomu
      POSTGRES_DB: gyomu_navi
    ports:
      - "5432:5432"
    volumes:
      - gyomu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gyomu -d gyomu_navi"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  gyomu_pgdata:
